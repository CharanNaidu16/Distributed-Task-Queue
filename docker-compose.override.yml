# Dev-only overrides. docker-compose automatically merges this on top of
# docker-compose.yml when you run `docker-compose up`.
#
# It mounts your local code into the containers so changes apply without
# rebuilding, and runs the API with --reload (auto-restart on edit).
services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  worker:
    # RQ does not hot-reload; restart the worker container after code changes.
    volumes:
      - ./backend:/app
