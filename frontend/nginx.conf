server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA. Unknown paths fall back to index.html (client routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service. /api/jobs -> api:8000/jobs
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
