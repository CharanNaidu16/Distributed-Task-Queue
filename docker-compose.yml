# One command to run the whole system:  docker-compose up --build
# Services:
#   redis    - the queue + result store (official image, nothing to install)
#   api      - FastAPI producer: accepts jobs, reports status
#   worker   - RQ consumer: runs the jobs (scale with: docker-compose up --scale worker=3)
#   frontend - React SPA served by nginx, proxies /api -> api
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build: ./backend
    # api and worker share THIS image; only the command differs.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - job-storage:/app/storage

  worker:
    build: ./backend
    command: python -m worker.worker
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - job-storage:/app/storage

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  redis-data:
  job-storage:
